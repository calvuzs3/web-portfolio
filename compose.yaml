# version: "3" #obsolete

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
    ports:
      - 3000:3000
    networks:
      - web-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web-network:
    external: true # Questo permette di connettersi alla rete già esistente del reverse proxy
